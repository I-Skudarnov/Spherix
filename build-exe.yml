name: Build Windows EXE

on:
  push:
    branches: [main]
    paths:
      - "spherix.py"
      - "sprites_ref/**"
      - "ref_bottom.png"
      - "ref_bottom_new.png"
      - "SPHERIX.DAT"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller pygame

      # Та же команда, что и в make_EXE.bat.
      - name: Build EXE
        shell: pwsh
        run: |
          python -m PyInstaller --onefile --windowed --name SPHERIX --noconfirm `
            --add-data "sprites_ref;sprites_ref" `
            --add-data "ref_bottom_new.png;." `
            --add-data "ref_bottom.png;." `
            --add-data "SPHERIX.DAT;." `
            spherix.py

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "SPHERIX — Windows build"
          make_latest: true
          files: dist/SPHERIX.exe
